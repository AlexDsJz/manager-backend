version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: manager_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-manager_db}
      POSTGRES_USER: ${DB_USER:-manager_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-manager_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-manager_user} -d ${DB_NAME:-manager_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: manager_backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development

volumes:
  postgres_data:
